<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Walk Tracker v2</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111;
      color: #fff;
    }

    #app {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      background: #111;
    }

    #topbar {
      padding: 12px;
      background: #111;
      border-bottom: 1px solid #222;
    }

    #stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .card {
      background: #1e1e1e;
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
    }

    .label {
      font-size: 14px;
      color: #bdbdbd;
      margin-bottom: 8px;
    }

    .value {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    #controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 10px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }

    #startBtn {
      background: #2f6fed;
    }

    #pauseBtn {
      background: #6d6d6d;
    }

    #stopBtn {
      background: #d23b3b;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #map {
      width: 100%;
      height: 52dvh;
      min-height: 320px;
      max-height: 560px;
    }

    #history {
      padding: 14px 12px 28px;
      background: #111;
      border-top: 1px solid #222;
      min-height: 150px;
    }

    #history h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
    }

    .history-item {
      background: #1e1e1e;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .history-main {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .history-sub {
      font-size: 14px;
      color: #bdbdbd;
    }

    .empty {
      color: #bdbdbd;
      font-size: 15px;
    }

    .note {
      margin-top: 10px;
      font-size: 12px;
      color: #8d8d8d;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="topbar">
      <div id="stats">
        <div class="card">
          <div class="label">거리</div>
          <div class="value" id="distance">0.00 km</div>
        </div>
        <div class="card">
          <div class="label">시간</div>
          <div class="value" id="time">00:00</div>
        </div>
        <div class="card">
          <div class="label">상태</div>
          <div class="value" id="status">대기</div>
        </div>
      </div>

      <div id="controls">
        <button id="startBtn">시작</button>
        <button id="pauseBtn">일시정지</button>
        <button id="stopBtn">종료</button>
      </div>
    </div>

    <div id="map"></div>

    <div id="history">
      <h2>기록</h2>
      <div id="historyList"></div>
      <div class="note">
        GPS는 도심·실내·고층 건물 주변에서 오차가 커질 수 있습니다.
      </div>
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <script>
    const distanceEl = document.getElementById("distance");
    const timeEl = document.getElementById("time");
    const statusEl = document.getElementById("status");
    const historyListEl = document.getElementById("historyList");

    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const stopBtn = document.getElementById("stopBtn");

    const map = L.map("map").setView([35.1796, 129.0756], 14);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    let watchId = null;
    let currentMarker = null;
    let startMarker = null;
    let endMarker = null;
    let routeLine = L.polyline([], { weight: 6 }).addTo(map);

    let isTracking = false;
    let isPaused = false;

    let path = [];
    let totalDistance = 0;

    let startTime = null;
    let pausedAt = null;
    let pausedDuration = 0;
    let timerInterval = null;

    let lastAcceptedPoint = null;
    let lastAcceptedTime = null;

    const MIN_ACCURACY_METERS = 35;   // 정확도 35m보다 나쁘면 무시
    const MIN_MOVE_METERS = 5;        // 5m 미만은 흔들림으로 간주
    const MAX_WALK_SPEED = 3.0;       // m/s, 시속 약 10.8km 초과면 점프 의심
    const WARMUP_MS = 8000;           // 시작 후 8초 워밍업

    function formatTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, "0");
      const seconds = Math.floor(totalSeconds % 60).toString().padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function formatDate(date) {
      return new Date(date).toLocaleString("ko-KR");
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function updateDistance() {
      distanceEl.textContent = `${(totalDistance / 1000).toFixed(2)} km`;
    }

    function updateTimer() {
      if (!startTime || isPaused) return;
      const now = Date.now();
      const elapsed = Math.floor((now - startTime - pausedDuration) / 1000);
      timeEl.textContent = formatTime(elapsed);
    }

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const toRad = deg => deg * Math.PI / 180;

      const φ1 = toRad(lat1);
      const φ2 = toRad(lat2);
      const Δφ = toRad(lat2 - lat1);
      const Δλ = toRad(lon2 - lon1);

      const a =
        Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
        Math.cos(φ1) * Math.cos(φ2) *
        Math.sin(Δλ / 2) * Math.sin(Δλ / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function updateButtons() {
      if (isTracking && !isPaused) {
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        stopBtn.disabled = false;
      } else if (isTracking && isPaused) {
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        stopBtn.disabled = false;
      } else {
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        stopBtn.disabled = true;
      }
    }

    function ensureMarker(point) {
      if (!currentMarker) {
        currentMarker = L.marker(point).addTo(map);
      } else {
        currentMarker.setLatLng(point);
      }
    }

    function onLocationFound(position) {
      if (!isTracking || isPaused) return;

      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      const accuracy = position.coords.accuracy || 999;
      const now = position.timestamp || Date.now();
      const point = [lat, lng];

      ensureMarker(point);

      // 지도는 현재 위치 중심으로 따라가게
      map.setView(point, 17);

      // 정확도 너무 나쁘면 기록에는 반영하지 않음
      if (accuracy > MIN_ACCURACY_METERS) {
        setStatus("GPS 보정 중");
        return;
      }

      // 첫 점 처리
      if (!lastAcceptedPoint) {
        lastAcceptedPoint = point;
        lastAcceptedTime = now;
        path.push(point);
        routeLine.setLatLngs(path);

        if (startMarker) {
          map.removeLayer(startMarker);
        }
        startMarker = L.marker(point).addTo(map);

        setStatus("워밍업 중");
        return;
      }

      // 워밍업 시간에는 선과 거리 계산 최소화
      if (startTime && (now - startTime) < WARMUP_MS) {
        return;
      }

      const [prevLat, prevLng] = lastAcceptedPoint;
      const distance = haversine(prevLat, prevLng, lat, lng);
      const timeDiffSec = Math.max((now - lastAcceptedTime) / 1000, 1);
      const speed = distance / timeDiffSec;

      // 너무 짧은 흔들림 제거
      if (distance < MIN_MOVE_METERS) {
        setStatus("추적 중");
        return;
      }

      // 비정상 점프 제거
      if (speed > MAX_WALK_SPEED) {
        setStatus("GPS 보정 중");
        return;
      }

      // 정상 좌표만 선/거리 둘 다 반영
      totalDistance += distance;
      updateDistance();

      lastAcceptedPoint = point;
      lastAcceptedTime = now;

      path.push(point);
      routeLine.setLatLngs(path);

      setStatus("추적 중");
    }

    function onLocationError(error) {
      console.error(error);
      setStatus("위치 오류");
      alert("위치 정보를 가져올 수 없습니다: " + error.message);
    }

    function startTracking() {
      if (!navigator.geolocation) {
        alert("이 기기는 위치 추적을 지원하지 않습니다.");
        return;
      }

      // 이미 추적 중이면 중복 시작 방지
      if (isTracking && !isPaused) return;

      // 일시정지 상태에서 재시작
      if (isTracking && isPaused) {
        isPaused = false;
        if (pausedAt) {
          pausedDuration += Date.now() - pausedAt;
        }
        setStatus("추적 중");
        updateButtons();
        return;
      }

      // 완전 새 추적 시작
      isTracking = true;
      isPaused = false;
      startTime = Date.now();
      pausedAt = null;
      pausedDuration = 0;

      totalDistance = 0;
      path = [];
      lastAcceptedPoint = null;
      lastAcceptedTime = null;

      updateDistance();
      timeEl.textContent = "00:00";
      setStatus("워밍업 중");

      if (routeLine) {
        routeLine.setLatLngs([]);
      }

      if (currentMarker) {
        map.removeLayer(currentMarker);
        currentMarker = null;
      }
      if (startMarker) {
        map.removeLayer(startMarker);
        startMarker = null;
      }
      if (endMarker) {
        map.removeLayer(endMarker);
        endMarker = null;
      }

      if (timerInterval) {
        clearInterval(timerInterval);
      }
      timerInterval = setInterval(updateTimer, 1000);

      if (watchId) {
        navigator.geolocation.clearWatch(watchId);
      }

      watchId = navigator.geolocation.watchPosition(
        onLocationFound,
        onLocationError,
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 15000
        }
      );

      updateButtons();
    }

    function pauseTracking() {
      if (!isTracking || isPaused) return;

      isPaused = true;
      pausedAt = Date.now();
      setStatus("일시정지");
      updateButtons();
    }

    function stopTracking() {
      if (!isTracking && !startTime) return;

      if (watchId) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }

      const endTime = Date.now();
      const elapsedSeconds = startTime
        ? Math.floor((endTime - startTime - pausedDuration - (isPaused && pausedAt ? (endTime - pausedAt) : 0)) / 1000)
        : 0;

      if (path.length > 0) {
        const lastPoint = path[path.length - 1];
        if (endMarker) {
          map.removeLayer(endMarker);
        }
        endMarker = L.marker(lastPoint).addTo(map);
      }

      if (path.length >= 2 && totalDistance > 0) {
        const record = {
          date: new Date().toISOString(),
          distanceKm: (totalDistance / 1000).toFixed(2),
          durationSec: elapsedSeconds,
          path
        };
        saveRecord(record);
        renderHistory();
      }

      isTracking = false;
      isPaused = false;
      pausedAt = null;
      startTime = null;
      pausedDuration = 0;
      totalDistance = 0;
      path = [];
      lastAcceptedPoint = null;
      lastAcceptedTime = null;

      distanceEl.textContent = "0.00 km";
      timeEl.textContent = "00:00";
      setStatus("대기");

      if (currentMarker) {
        map.removeLayer(currentMarker);
        currentMarker = null;
      }

      routeLine.setLatLngs([]);
      updateButtons();
    }

    function saveRecord(record) {
      const records = JSON.parse(localStorage.getItem("walkRecords") || "[]");
      records.unshift(record);
      localStorage.setItem("walkRecords", JSON.stringify(records));
    }

    function renderHistory() {
      const records = JSON.parse(localStorage.getItem("walkRecords") || "[]");
      historyListEl.innerHTML = "";

      if (records.length === 0) {
        historyListEl.innerHTML = `<div class="empty">아직 기록이 없습니다.</div>`;
        return;
      }

      records.slice(0, 10).forEach((record, index) => {
        const item = document.createElement("div");
        item.className = "history-item";
        item.innerHTML = `
          <div class="history-main">${index + 1}. ${record.distanceKm} km · ${formatTime(record.durationSec)}</div>
          <div class="history-sub">${formatDate(record.date)}</div>
        `;
        historyListEl.appendChild(item);
      });
    }

    startBtn.addEventListener("click", startTracking);
    pauseBtn.addEventListener("click", pauseTracking);
    stopBtn.addEventListener("click", stopTracking);

    renderHistory();
    updateButtons();
  </script>
</body>
</html>
