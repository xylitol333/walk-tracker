<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Walk Tracker V2.3</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      color: #fff;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 12px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .card {
      background: #161616;
      border-radius: 18px;
      padding: 16px 12px;
      text-align: center;
      min-height: 96px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card .label {
      font-size: 14px;
      color: #a5a5a5;
      margin-bottom: 8px;
    }

    .card .value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.2;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 16px 12px;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #startBtn {
      background: #2453c3;
    }

    #pauseBtn {
      background: #8a8a8a;
    }

    #stopBtn {
      background: #df3a3a;
    }

    #map {
      height: 420px;
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    h2 {
      font-size: 28px;
      margin: 16px 0 12px;
    }

    .record-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .record-item {
      background: #161616;
      border-radius: 18px;
      padding: 18px;
      cursor: pointer;
    }

    .record-item .top {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .record-item .sub {
      font-size: 15px;
      color: #c0c0c0;
      margin-bottom: 10px;
    }

    .record-item .meta {
      font-size: 14px;
      color: #8f8f8f;
    }

    .hint {
      color: #9f9f9f;
      font-size: 14px;
      line-height: 1.5;
      margin: 8px 0 24px;
    }

    .center {
      text-align: center;
    }

    .footer-link {
      display: inline-block;
      background: #161616;
      border-radius: 999px;
      padding: 12px 22px;
      color: #fff;
      text-decoration: none;
      margin: 10px auto 24px;
      opacity: 0.92;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 16px;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      width: 100%;
      max-width: 760px;
      background: #111;
      border-radius: 20px;
      padding: 14px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
    }

    .close-btn {
      background: #333;
      border: none;
      color: #fff;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    #detailMap {
      height: 360px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .detail-box {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 14px;
    }

    .detail-box .k {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }

    .detail-box .v {
      font-size: 18px;
      font-weight: 700;
      word-break: break-word;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stats">
      <div class="card">
        <div class="label">거리</div>
        <div class="value" id="distanceDisplay">0.00 km</div>
      </div>
      <div class="card">
        <div class="label">시간</div>
        <div class="value" id="timeDisplay">00:00</div>
      </div>
      <div class="card">
        <div class="label">상태</div>
        <div class="value" id="statusDisplay">대기중</div>
      </div>
    </div>

    <div class="buttons">
      <button id="startBtn">시작</button>
      <button id="pauseBtn">일시정지</button>
      <button id="stopBtn">종료</button>
    </div>

    <div id="map"></div>

    <h2>기록</h2>
    <div class="record-list" id="recordList"></div>

    <div class="hint">
      GPS는 도심·실내·고층 건물 주변에서 오차가 커질 수 있습니다.
    </div>

    <div class="center">
      <a class="footer-link" href="#" onclick="return false;">xylitol333.github.io</a>
    </div>
  </div>

  <div class="modal" id="detailModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">저장된 트랙 보기</div>
        <button class="close-btn" id="closeModalBtn">닫기</button>
      </div>

      <div id="detailMap"></div>

      <div class="detail-grid">
        <div class="detail-box">
          <div class="k">거리</div>
          <div class="v" id="detailDistance">-</div>
        </div>
        <div class="detail-box">
          <div class="k">시간</div>
          <div class="v" id="detailDuration">-</div>
        </div>
        <div class="detail-box">
          <div class="k">시작</div>
          <div class="v" id="detailStartedAt">-</div>
        </div>
        <div class="detail-box">
          <div class="k">종료</div>
          <div class="v" id="detailEndedAt">-</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const STORAGE_KEY = "walkTrackerRecordsV23";

    let map = null;
    let polyline = null;
    let currentMarker = null;
    let watchId = null;

    let detailMap = null;
    let detailPolyline = null;

    let isTracking = false;
    let isPaused = false;

    let points = [];
    let totalDistance = 0;

    let startedAt = null;
    let endedAt = null;
    let pausedAt = null;
    let pausedAccumulatedMs = 0;
    let timerInterval = null;

    let mapCenteredOnce = false;

    function initMap() {
      map = L.map("map").setView([35.1796, 129.0756], 16);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);

      polyline = L.polyline([], { weight: 5 }).addTo(map);

      currentMarker = L.circleMarker([35.1796, 129.0756], {
        radius: 6
      }).addTo(map);

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const { latitude, longitude } = pos.coords;
            map.setView([latitude, longitude], 17);
            currentMarker.setLatLng([latitude, longitude]);
          },
          () => {},
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      }
    }

    function formatDistance(meters) {
      return (meters / 1000).toFixed(2) + " km";
    }

    function formatDuration(ms) {
      const totalSec = Math.floor(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;

      if (h > 0) {
        return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      }
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    function formatDate(ts) {
      if (!ts) return "-";
      const d = new Date(ts);
      if (Number.isNaN(d.getTime())) return "-";
      return d.toLocaleString("ko-KR");
    }

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = (x) => x * Math.PI / 180;

      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) *
        Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) *
        Math.sin(dLon / 2);

      return 2 * R * Math.asin(Math.sqrt(a));
    }

    function getElapsedMs() {
      if (!startedAt) return 0;

      let elapsed = 0;

      if (isTracking && !isPaused) {
        elapsed = Date.now() - startedAt - pausedAccumulatedMs;
      } else if (isTracking && isPaused && pausedAt) {
        elapsed = pausedAt - startedAt - pausedAccumulatedMs;
      } else if (endedAt) {
        elapsed = endedAt - startedAt - pausedAccumulatedMs;
      }

      return Math.max(0, elapsed);
    }

    function updateTopUI() {
      document.getElementById("distanceDisplay").textContent = formatDistance(totalDistance);
      document.getElementById("timeDisplay").textContent = formatDuration(getElapsedMs());

      let status = "대기중";
      if (isTracking && !isPaused) status = "기록 중";
      if (isTracking && isPaused) status = "일시정지";

      document.getElementById("statusDisplay").textContent = status;
    }

    function startTimer() {
      stopTimer();
      timerInterval = setInterval(updateTopUI, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function shouldAcceptPoint(newPoint, prevPoint) {
      if (!prevPoint) return true;

      const dt = (newPoint.ts - prevPoint.ts) / 1000;
      if (dt <= 0) return false;

      const dist = haversine(prevPoint.lat, prevPoint.lng, newPoint.lat, newPoint.lng);
      const speed = dist / dt;

      if (newPoint.accuracy && newPoint.accuracy > 130) {
        return false;
      }

      if (points.length < 3) {
        return true;
      }

      if (dist > 180 && dt < 3) {
        return false;
      }

      if (speed > 11) {
        return false;
      }

      return true;
    }

    function getDistanceContribution(prevPoint, newPoint) {
      const rawDist = haversine(prevPoint.lat, prevPoint.lng, newPoint.lat, newPoint.lng);
      const dt = (newPoint.ts - prevPoint.ts) / 1000;
      const accuracy = newPoint.accuracy ?? 999;

      if (dt <= 0) return 0;

      if (rawDist < 2) {
        return 0;
      }

      if (accuracy > 90 && rawDist < 6) {
        return 0;
      }

      if (accuracy > 60 && rawDist < 4) {
        return 0;
      }

      return rawDist;
    }

    function refreshPolyline() {
      polyline.setLatLngs(points.map(p => [p.lat, p.lng]));
    }

    function recenterMapIfNeeded(lat, lng) {
      currentMarker.setLatLng([lat, lng]);

      if (!mapCenteredOnce) {
        map.setView([lat, lng], 17);
        mapCenteredOnce = true;
        return;
      }

      const center = map.getCenter();
      const moveDist = haversine(center.lat, center.lng, lat, lng);

      if (moveDist > 35) {
        map.panTo([lat, lng]);
      }
    }

    function addPoint(lat, lng, accuracy) {
      const newPoint = {
        lat,
        lng,
        accuracy: accuracy ?? null,
        ts: Date.now()
      };

      const prevPoint = points.length ? points[points.length - 1] : null;

      recenterMapIfNeeded(lat, lng);

      if (!prevPoint) {
        points.push(newPoint);
        refreshPolyline();
        updateTopUI();
        return;
      }

      if (!shouldAcceptPoint(newPoint, prevPoint)) {
        return;
      }

      const distContribution = getDistanceContribution(prevPoint, newPoint);

      points.push(newPoint);
      totalDistance += distContribution;

      refreshPolyline();
      updateTopUI();
    }

    function startWatch() {
      if (!navigator.geolocation) {
        alert("이 기기에서는 위치 서비스를 사용할 수 없습니다.");
        return;
      }

      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          if (!isTracking || isPaused) return;

          const { latitude, longitude, accuracy } = pos.coords;
          addPoint(latitude, longitude, accuracy);
        },
        (err) => {
          console.error(err);
          document.getElementById("statusDisplay").textContent = "GPS 오류";
        },
        {
          enableHighAccuracy: true,
          maximumAge: 2000,
          timeout: 15000
        }
      );
    }

    function stopWatch() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
    }

    function startTracking() {
      if (isTracking && isPaused) {
        isPaused = false;
        if (pausedAt) {
          pausedAccumulatedMs += Date.now() - pausedAt;
          pausedAt = null;
        }
        startWatch();
        startTimer();
        updateTopUI();
        return;
      }

      if (isTracking && !isPaused) {
        return;
      }

      isTracking = true;
      isPaused = false;
      points = [];
      totalDistance = 0;
      startedAt = Date.now();
      endedAt = null;
      pausedAt = null;
      pausedAccumulatedMs = 0;
      mapCenteredOnce = false;

      polyline.setLatLngs([]);
      startWatch();
      startTimer();
      updateTopUI();
    }

    function pauseTracking() {
      if (!isTracking || isPaused) return;

      isPaused = true;
      pausedAt = Date.now();
      stopWatch();
      stopTimer();
      updateTopUI();
    }

    function stopTracking() {
      if (!isTracking) return;

      endedAt = Date.now();

      if (isPaused && pausedAt) {
        pausedAccumulatedMs += endedAt - pausedAt;
        pausedAt = null;
      }

      stopWatch();
      stopTimer();

      const durationMs = getElapsedMs();

      if (points.length >= 2 && startedAt) {
        const record = {
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
          distance: totalDistance,
          durationMs,
          startedAt,
          endedAt,
          path: points
        };
        saveRecord(record);
      }

      isTracking = false;
      isPaused = false;
      updateTopUI();
      renderRecords();
    }

    function getRecords() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = JSON.parse(raw || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveRecord(record) {
      const records = getRecords();
      records.unshift(record);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function renderRecords() {
      const list = document.getElementById("recordList");
      const records = getRecords();

      if (!records.length) {
        list.innerHTML = `
          <div class="record-item">
            <div class="top">아직 저장된 기록이 없습니다</div>
            <div class="sub">걷기를 시작하고 종료하면 여기에 기록이 쌓입니다.</div>
          </div>
        `;
        return;
      }

      list.innerHTML = records.map((r, idx) => {
        const pointCount = Array.isArray(r.path) ? r.path.length : 0;
        return `
          <div class="record-item" data-id="${r.id}">
            <div class="top">${idx + 1}. ${formatDistance(r.distance || 0)} · ${formatDuration(r.durationMs || 0)}</div>
            <div class="sub">${formatDate(r.startedAt)}</div>
            <div class="meta">트랙 포인트 ${pointCount}개 · 눌러서 지도 보기</div>
          </div>
        `;
      }).join("");

      document.querySelectorAll(".record-item[data-id]").forEach((el) => {
        el.addEventListener("click", () => {
          openRecordDetail(el.dataset.id);
        });
      });
    }

    function ensureDetailMap() {
      if (detailMap) return;

      detailMap = L.map("detailMap");

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(detailMap);

      detailPolyline = L.polyline([], { weight: 5 }).addTo(detailMap);
    }

    function openRecordDetail(id) {
      const record = getRecords().find(r => r.id === id);
      if (!record) return;

      document.getElementById("detailDistance").textContent = formatDistance(record.distance || 0);
      document.getElementById("detailDuration").textContent = formatDuration(record.durationMs || 0);
      document.getElementById("detailStartedAt").textContent = formatDate(record.startedAt);
      document.getElementById("detailEndedAt").textContent = formatDate(record.endedAt);

      const modal = document.getElementById("detailModal");
      modal.classList.add("open");

      setTimeout(() => {
        ensureDetailMap();

        const latlngs = (record.path || []).map(p => [p.lat, p.lng]);
        detailPolyline.setLatLngs(latlngs);

        if (latlngs.length > 0) {
          detailMap.fitBounds(latlngs, { padding: [20, 20] });
        } else {
          detailMap.setView([35.1796, 129.0756], 16);
        }

        detailMap.invalidateSize();
      }, 60);
    }

    function closeDetailModal() {
      document.getElementById("detailModal").classList.remove("open");
    }

    document.getElementById("startBtn").addEventListener("click", startTracking);
    document.getElementById("pauseBtn").addEventListener("click", pauseTracking);
    document.getElementById("stopBtn").addEventListener("click", stopTracking);
    document.getElementById("closeModalBtn").addEventListener("click", closeDetailModal);

    document.getElementById("detailModal").addEventListener("click", (e) => {
      if (e.target.id === "detailModal") {
        closeDetailModal();
      }
    });

    initMap();
    renderRecords();
    updateTopUI();
  </script>
</body>
</html>
