<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Walk Tracker V3 - POI</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      color: #fff;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 12px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .card {
      background: #161616;
      border-radius: 18px;
      padding: 16px 12px;
      text-align: center;
    }

    .card .label {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 8px;
    }

    .card .value {
      font-size: 24px;
      font-weight: 700;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 16px 12px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
    }

    #startBtn { background: #1f4fbf; }
    #pauseBtn { background: #7a7a7a; }
    #stopBtn  { background: #d43a3a; }
    #poiBtn   { background: #2f7d32; }

    #map {
      height: 420px;
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    h2 {
      font-size: 28px;
      margin: 16px 0 12px;
    }

    .record-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .record-item {
      background: #161616;
      border-radius: 18px;
      padding: 18px;
      cursor: pointer;
    }

    .record-item .top {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .record-item .sub {
      font-size: 15px;
      color: #bdbdbd;
      margin-bottom: 10px;
    }

    .record-item .meta {
      font-size: 14px;
      color: #8d8d8d;
    }

    .hint {
      color: #9c9c9c;
      font-size: 14px;
      line-height: 1.5;
      margin: 8px 0 24px;
    }

    .footer-link {
      display: inline-block;
      background: #1a1a1a;
      border-radius: 999px;
      padding: 12px 22px;
      color: #fff;
      text-decoration: none;
      margin: 10px auto 24px;
    }

    .center {
      text-align: center;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 16px;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      width: 100%;
      max-width: 760px;
      background: #111;
      border-radius: 20px;
      padding: 14px;
      max-height: 92vh;
      overflow: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
    }

    .close-btn {
      background: #333;
      border: none;
      color: #fff;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    #detailMap {
      height: 360px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .detail-box {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 14px;
    }

    .detail-box .k {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }

    .detail-box .v {
      font-size: 18px;
      font-weight: 700;
      word-break: break-word;
    }

    .poi-form {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .poi-form input,
    .poi-form textarea {
      width: 100%;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }

    .poi-form textarea {
      min-height: 90px;
      resize: vertical;
    }

    .poi-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .poi-save-btn {
      background: #2f7d32;
    }

    .poi-cancel-btn {
      background: #555;
    }

    .poi-preview-wrap {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 10px;
    }

    .poi-preview-title {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 8px;
    }

    .poi-preview-img {
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      border-radius: 12px;
      display: none;
    }

    .poi-list-box {
      margin-top: 12px;
      background: #161616;
      border-radius: 16px;
      padding: 14px;
    }

    .poi-list-title {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .poi-item {
      background: #1d1d1d;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .poi-item:last-child {
      margin-bottom: 0;
    }

    .poi-item-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .poi-item-meta {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 8px;
    }

    .poi-item-note {
      font-size: 14px;
      color: #ddd;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .poi-item-img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 8px;
    }

    @media (max-width: 640px) {
      .stats {
        grid-template-columns: 1fr;
      }

      .buttons {
        grid-template-columns: repeat(2, 1fr);
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .record-item .top {
        font-size: 18px;
      }

      .card .value {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stats">
      <div class="card">
        <div class="label">거리</div>
        <div class="value" id="distanceDisplay">0.00 km</div>
      </div>
      <div class="card">
        <div class="label">시간</div>
        <div class="value" id="timeDisplay">00:00</div>
      </div>
      <div class="card">
        <div class="label">상태</div>
        <div class="value" id="statusDisplay">대기중</div>
      </div>
    </div>

    <div class="buttons">
      <button id="startBtn">시작</button>
      <button id="pauseBtn">일시정지</button>
      <button id="stopBtn">종료</button>
      <button id="poiBtn">POI 추가</button>
    </div>

    <div id="map"></div>

    <h2>기록</h2>
    <div class="record-list" id="recordList"></div>

    <div class="hint">
      GPS는 도심·실내·고층 건물 주변에서 오차가 커질 수 있습니다. POI는 트래킹 중 현재 위치 기준으로 저장됩니다.
    </div>

    <div class="center">
      <a class="footer-link" href="#" onclick="return false;">xylitol333.github.io</a>
    </div>
  </div>

  <div class="modal" id="detailModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">저장된 트랙 보기</div>
        <button class="close-btn" id="closeModalBtn">닫기</button>
      </div>

      <div id="detailMap"></div>

      <div class="detail-grid">
        <div class="detail-box">
          <div class="k">거리</div>
          <div class="v" id="detailDistance">-</div>
        </div>
        <div class="detail-box">
          <div class="k">시간</div>
          <div class="v" id="detailDuration">-</div>
        </div>
        <div class="detail-box">
          <div class="k">시작</div>
          <div class="v" id="detailStartedAt">-</div>
        </div>
        <div class="detail-box">
          <div class="k">종료</div>
          <div class="v" id="detailEndedAt">-</div>
        </div>
      </div>

      <div class="poi-list-box" id="detailPoiBox" style="display:none;">
        <div class="poi-list-title">POI 기록</div>
        <div id="detailPoiList"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="poiModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">POI 저장</div>
        <button class="close-btn" id="closePoiModalBtn">닫기</button>
      </div>

      <div class="detail-box" style="margin-bottom:10px;">
        <div class="k">현재 위치</div>
        <div class="v" id="poiLocationText">-</div>
      </div>

      <div class="poi-form">
        <input type="text" id="poiTitleInput" placeholder="예: 석양 포인트" maxlength="60" />
        <textarea id="poiNoteInput" placeholder="짧은 메모를 남겨보세요"></textarea>
        <input type="file" id="poiPhotoInput" accept="image/*" />
        <div class="poi-preview-wrap">
          <div class="poi-preview-title">사진 미리보기</div>
          <img id="poiPreviewImg" class="poi-preview-img" alt="POI preview" />
        </div>
        <div class="poi-actions">
          <button class="poi-cancel-btn" id="poiCancelBtn">취소</button>
          <button class="poi-save-btn" id="poiSaveBtn">저장</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const STORAGE_KEY = "walkTrackerRecordsV3";

    let map;
    let polyline;
    let watchId = null;
    let livePoiMarkersLayer = null;

    let detailMap = null;
    let detailPolyline = null;
    let detailPoiLayer = null;

    let isTracking = false;
    let isPaused = false;

    let points = [];
    let pois = [];
    let totalDistance = 0;

    let startedAt = null;
    let endedAt = null;

    let pausedAt = null;
    let pausedAccumulatedMs = 0;

    let timerInterval = null;

    let currentPosition = null;
    let pendingPoiPhotoData = "";

    function initMap() {
      map = L.map("map").setView([35.1796, 129.0756], 16);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      polyline = L.polyline([], { weight: 5 }).addTo(map);
      livePoiMarkersLayer = L.layerGroup().addTo(map);

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const { latitude, longitude, accuracy } = pos.coords;
            currentPosition = {
              lat: latitude,
              lng: longitude,
              accuracy: accuracy ?? null,
              ts: Date.now()
            };
            map.setView([latitude, longitude], 17);
          },
          () => {},
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      }
    }

    function formatDistance(meters) {
      return (meters / 1000).toFixed(2) + " km";
    }

    function formatDuration(ms) {
      const totalSec = Math.floor(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;

      if (h > 0) {
        return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      }
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    function formatDate(ts) {
      if (!ts || Number.isNaN(new Date(ts).getTime())) return "-";
      const d = new Date(ts);
      return d.toLocaleString("ko-KR");
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function updateTopUI() {
      document.getElementById("distanceDisplay").textContent = formatDistance(totalDistance);

      let elapsed = 0;
      if (startedAt) {
        const now = Date.now();
        if (isTracking && !isPaused) {
          elapsed = now - startedAt - pausedAccumulatedMs;
        } else if (isPaused && pausedAt) {
          elapsed = pausedAt - startedAt - pausedAccumulatedMs;
        } else if (endedAt) {
          elapsed = endedAt - startedAt - pausedAccumulatedMs;
        }
      }
      if (elapsed < 0) elapsed = 0;

      document.getElementById("timeDisplay").textContent = formatDuration(elapsed);

      let status = "대기중";
      if (isTracking && !isPaused) status = "기록 중";
      if (isTracking && isPaused) status = "일시정지";
      document.getElementById("statusDisplay").textContent = status;
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTopUI, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = (x) => x * Math.PI / 180;

      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) *
        Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) *
        Math.sin(dLon / 2);

      return 2 * R * Math.asin(Math.sqrt(a));
    }

    function shouldAcceptPoint(newPoint, prevPoint) {
      if (!prevPoint) return true;

      const dist = haversine(prevPoint.lat, prevPoint.lng, newPoint.lat, newPoint.lng);
      const dt = (newPoint.ts - prevPoint.ts) / 1000;

      if (dt <= 0) return false;

      const speed = dist / dt;

      if (newPoint.accuracy && newPoint.accuracy > 45) {
        return false;
      }

      if (dist > 80 && dt < 10) {
        return false;
      }

      if (speed > 4.0) {
        return false;
      }

      return true;
    }

    function addPoint(lat, lng, accuracy) {
      const newPoint = {
        lat,
        lng,
        accuracy: accuracy ?? null,
        ts: Date.now()
      };

      currentPosition = { ...newPoint };

      const prevPoint = points.length ? points[points.length - 1] : null;

      if (!shouldAcceptPoint(newPoint, prevPoint)) return;

      if (prevPoint) {
        totalDistance += haversine(prevPoint.lat, prevPoint.lng, newPoint.lat, newPoint.lng);
      }

      points.push(newPoint);
      polyline.setLatLngs(points.map(p => [p.lat, p.lng]));

      if (points.length === 1) {
        map.setView([lat, lng], 17);
      } else {
        map.panTo([lat, lng]);
      }

      updateTopUI();
    }

    function startTracking() {
      if (isTracking && isPaused) {
        isPaused = false;
        if (pausedAt) {
          pausedAccumulatedMs += Date.now() - pausedAt;
          pausedAt = null;
        }
        startWatch();
        updateTopUI();
        return;
      }

      if (isTracking) return;

      isTracking = true;
      isPaused = false;
      points = [];
      pois = [];
      totalDistance = 0;
      startedAt = Date.now();
      endedAt = null;
      pausedAt = null;
      pausedAccumulatedMs = 0;
      pendingPoiPhotoData = "";

      polyline.setLatLngs([]);
      livePoiMarkersLayer.clearLayers();

      startTimer();
      startWatch();
      updateTopUI();
    }

    function pauseTracking() {
      if (!isTracking || isPaused) return;

      isPaused = true;
      pausedAt = Date.now();

      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      updateTopUI();
    }

    function stopTracking() {
      if (!isTracking) return;

      endedAt = Date.now();

      if (isPaused && pausedAt) {
        pausedAccumulatedMs += endedAt - pausedAt;
        pausedAt = null;
      }

      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      stopTimer();

      const durationMs = Math.max(0, endedAt - startedAt - pausedAccumulatedMs);

      if (points.length >= 2 && startedAt) {
        const record = {
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
          distance: totalDistance,
          durationMs,
          startedAt,
          endedAt,
          path: points,
          pois: pois
        };

        saveRecord(record);
      }

      isTracking = false;
      isPaused = false;
      updateTopUI();
      renderRecords();
    }

    function startWatch() {
      if (!navigator.geolocation) {
        alert("이 기기에서는 위치 서비스를 사용할 수 없습니다.");
        return;
      }

      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          const { latitude, longitude, accuracy } = pos.coords;
          currentPosition = {
            lat: latitude,
            lng: longitude,
            accuracy: accuracy ?? null,
            ts: Date.now()
          };

          if (!isTracking || isPaused) return;
          addPoint(latitude, longitude, accuracy);
        },
        (err) => {
          console.error(err);
          document.getElementById("statusDisplay").textContent = "GPS 오류";
        },
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 10000
        }
      );
    }

    function getRecords() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function saveRecord(record) {
      const records = getRecords();
      records.unshift(record);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function renderRecords() {
      const list = document.getElementById("recordList");
      const records = getRecords();

      if (!records.length) {
        list.innerHTML = `
          <div class="record-item">
            <div class="top">아직 저장된 기록이 없습니다</div>
            <div class="sub">걷기를 시작하고 종료하면 여기에 기록이 쌓입니다.</div>
          </div>
        `;
        return;
      }

      list.innerHTML = records.map((r, idx) => {
        const pathCount = Array.isArray(r.path) ? r.path.length : 0;
        const poiCount = Array.isArray(r.pois) ? r.pois.length : 0;
        return `
          <div class="record-item" data-id="${r.id}">
            <div class="top">${idx + 1}. ${formatDistance(r.distance)} · ${formatDuration(r.durationMs)}</div>
            <div class="sub">${formatDate(r.startedAt)}</div>
            <div class="meta">트랙 포인트 ${pathCount}개 · POI ${poiCount}개 · 눌러서 지도 보기</div>
          </div>
        `;
      }).join("");

      document.querySelectorAll(".record-item[data-id]").forEach(el => {
        el.addEventListener("click", () => {
          openRecordDetail(el.dataset.id);
        });
      });
    }

    function ensureDetailMap() {
      if (!detailMap) {
        detailMap = L.map("detailMap");
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: '&copy; OpenStreetMap contributors'
        }).addTo(detailMap);

        detailPolyline = L.polyline([], { weight: 5 }).addTo(detailMap);
        detailPoiLayer = L.layerGroup().addTo(detailMap);
      }
    }

    function getPoiPopupHtml(poi) {
      const title = escapeHtml(poi.title || "POI");
      const note = escapeHtml(poi.note || "");
      const date = formatDate(poi.createdAt);
      const imgHtml = poi.photo
        ? `<img src="${poi.photo}" alt="${title}" style="width:100%;max-width:220px;border-radius:10px;margin-top:8px;" />`
        : "";

      return `
        <div style="min-width:180px;max-width:240px;">
          <div style="font-weight:800;font-size:15px;margin-bottom:6px;">${title}</div>
          <div style="font-size:12px;color:#666;margin-bottom:6px;">${date}</div>
          ${note ? `<div style="font-size:13px;line-height:1.45;white-space:pre-wrap;">${note}</div>` : ""}
          ${imgHtml}
        </div>
      `;
    }

    function renderDetailPoiList(pois) {
      const box = document.getElementById("detailPoiBox");
      const list = document.getElementById("detailPoiList");

      if (!Array.isArray(pois) || !pois.length) {
        box.style.display = "none";
        list.innerHTML = "";
        return;
      }

      box.style.display = "block";
      list.innerHTML = pois.map((poi, idx) => `
        <div class="poi-item">
          <div class="poi-item-title">${idx + 1}. ${escapeHtml(poi.title || "POI")}</div>
          <div class="poi-item-meta">${formatDate(poi.createdAt)} · ${poi.lat.toFixed(5)}, ${poi.lng.toFixed(5)}</div>
          ${poi.note ? `<div class="poi-item-note">${escapeHtml(poi.note)}</div>` : ""}
          ${poi.photo ? `<img class="poi-item-img" src="${poi.photo}" alt="${escapeHtml(poi.title || "POI")}" />` : ""}
        </div>
      `).join("");
    }

    function openRecordDetail(id) {
      const record = getRecords().find(r => r.id === id);
      if (!record) return;

      document.getElementById("detailDistance").textContent = formatDistance(record.distance || 0);
      document.getElementById("detailDuration").textContent = formatDuration(record.durationMs || 0);
      document.getElementById("detailStartedAt").textContent = formatDate(record.startedAt);
      document.getElementById("detailEndedAt").textContent = formatDate(record.endedAt);

      renderDetailPoiList(record.pois || []);

      const modal = document.getElementById("detailModal");
      modal.classList.add("open");

      setTimeout(() => {
        ensureDetailMap();

        const latlngs = (record.path || []).map(p => [p.lat, p.lng]);
        detailPolyline.setLatLngs(latlngs);
        detailPoiLayer.clearLayers();

        (record.pois || []).forEach(poi => {
          const marker = L.marker([poi.lat, poi.lng]).addTo(detailPoiLayer);
          marker.bindPopup(getPoiPopupHtml(poi));
        });

        if (latlngs.length) {
          const bounds = L.latLngBounds(latlngs);
          (record.pois || []).forEach(poi => bounds.extend([poi.lat, poi.lng]));
          detailMap.fitBounds(bounds, { padding: [20, 20] });
        } else if ((record.pois || []).length) {
          const firstPoi = record.pois[0];
          detailMap.setView([firstPoi.lat, firstPoi.lng], 17);
        } else {
          detailMap.setView([35.1796, 129.0756], 16);
        }

        detailMap.invalidateSize();
      }, 50);
    }

    function closeDetailModal() {
      document.getElementById("detailModal").classList.remove("open");
    }

    function openPoiModal() {
      if (!isTracking) {
        alert("먼저 트래킹을 시작한 뒤 POI를 추가해줘.");
        return;
      }

      if (isPaused) {
        alert("일시정지 상태에서는 POI를 저장할 수 없어. 다시 시작한 뒤 추가해줘.");
        return;
      }

      if (!currentPosition) {
        alert("아직 현재 위치를 받지 못했어. 잠시 후 다시 시도해줘.");
        return;
      }

      document.getElementById("poiTitleInput").value = "";
      document.getElementById("poiNoteInput").value = "";
      document.getElementById("poiPhotoInput").value = "";
      pendingPoiPhotoData = "";

      const preview = document.getElementById("poiPreviewImg");
      preview.src = "";
      preview.style.display = "none";

      document.getElementById("poiLocationText").textContent =
        `${currentPosition.lat.toFixed(5)}, ${currentPosition.lng.toFixed(5)}`
        + (currentPosition.accuracy ? ` / 정확도 ±${Math.round(currentPosition.accuracy)}m` : "");

      document.getElementById("poiModal").classList.add("open");
    }

    function closePoiModal() {
      document.getElementById("poiModal").classList.remove("open");
    }

    function addLivePoiMarker(poi) {
      const marker = L.marker([poi.lat, poi.lng]).addTo(livePoiMarkersLayer);
      marker.bindPopup(getPoiPopupHtml(poi));
    }

    function savePoiFromModal() {
      if (!currentPosition) {
        alert("현재 위치를 확인할 수 없어.");
        return;
      }

      const title = document.getElementById("poiTitleInput").value.trim() || "이름 없는 POI";
      const note = document.getElementById("poiNoteInput").value.trim();

      const poi = {
        id: crypto.randomUUID ? crypto.randomUUID() : `poi_${Date.now()}`,
        lat: currentPosition.lat,
        lng: currentPosition.lng,
        accuracy: currentPosition.accuracy ?? null,
        createdAt: Date.now(),
        title,
        note,
        photo: pendingPoiPhotoData || ""
      };

      pois.push(poi);
      addLivePoiMarker(poi);
      closePoiModal();
    }

    function handlePoiPhotoChange(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) {
        pendingPoiPhotoData = "";
        const preview = document.getElementById("poiPreviewImg");
        preview.src = "";
        preview.style.display = "none";
        return;
      }

      const reader = new FileReader();
      reader.onload = function(ev) {
        pendingPoiPhotoData = ev.target.result || "";
        const preview = document.getElementById("poiPreviewImg");
        preview.src = pendingPoiPhotoData;
        preview.style.display = pendingPoiPhotoData ? "block" : "none";
      };
      reader.readAsDataURL(file);
    }

    document.getElementById("startBtn").addEventListener("click", startTracking);
    document.getElementById("pauseBtn").addEventListener("click", pauseTracking);
    document.getElementById("stopBtn").addEventListener("click", stopTracking);
    document.getElementById("poiBtn").addEventListener("click", openPoiModal);

    document.getElementById("closeModalBtn").addEventListener("click", closeDetailModal);
    document.getElementById("detailModal").addEventListener("click", (e) => {
      if (e.target.id === "detailModal") closeDetailModal();
    });

    document.getElementById("closePoiModalBtn").addEventListener("click", closePoiModal);
    document.getElementById("poiCancelBtn").addEventListener("click", closePoiModal);
    document.getElementById("poiSaveBtn").addEventListener("click", savePoiFromModal);
    document.getElementById("poiPhotoInput").addEventListener("change", handlePoiPhotoChange);
    document.getElementById("poiModal").addEventListener("click", (e) => {
      if (e.target.id === "poiModal") closePoiModal();
    });

    initMap();
    renderRecords();
    updateTopUI();
  </script>
</body>
</html>
